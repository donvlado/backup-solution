      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  DeploymentBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt CodePipelineKMSKey.Arn
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: deployment-bucket/
      LifecycleConfiguration:
        Rules:
        - Id: DeleteRule
          Status: Enabled
          ExpirationInDays: '90'

  DeploymentBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket: !Ref DeploymentBucket
      PolicyDocument:
        Version: '2012-10-17'
        Id: SSEAndSSLPolicy
        Statement:
        - Sid: DenyInsecureConnections
          Effect: Deny
          Principal: "*"
          Action: s3:*
          Resource:
          - !Join
            - ''
            - - Fn::GetAtt: [ DeploymentBucket, Arn ]
              - '/*'
          Condition:
            Bool:
              aws:SecureTransport: 'false'
        - Sid: DenyS3PublicObjectACL
          Effect: Deny
          Principal: "*"
          Action: s3:PutObjectAcl
          Resource:
          - !Join
            - ''
            - - Fn::GetAtt: [ DeploymentBucket, Arn ]
              - '/*'
          Condition:
            StringEqualsIgnoreCaseIfExists:
              s3:x-amz-acl:
              - public-read
              - public-read-write
              - authenticated-read

        - Sid: ''
          Effect: Allow
          Principal: "*"
          Action:
          - s3:ListBucket
          Resource: !GetAtt DeploymentBucket.Arn
          Condition:
            ForAnyValue:StringLike:
              aws:PrincipalOrgPaths:
              - !Sub "${OrgId}/*"

        - Sid: ''
          Effect: Allow
          Principal: "*"
          Action:
          - s3:Get*
          Resource:
          - !Join
            - ''
            - - Fn::GetAtt: [ DeploymentBucket, Arn ]
              - '/*'
          Condition:
            ForAnyValue:StringLike:
              aws:PrincipalOrgPaths:
              - !Sub "${OrgId}/*"

  AccessLogsBucket:
    Type: "AWS::S3::Bucket"
    #checkov:skip=CKV_AWS_18:Bucket destino de S3 server access logs; no puede auto-loguearse (recursion), excepcion documentada de AWS para buckets de logs.
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
        - Id: ExpireAccessLogs
          Status: Enabled
          ExpirationInDays: '365'
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  AccessLogsBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket: !Ref AccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: S3ServerAccessLogsDelivery
          Effect: Allow
          Principal:
            Service: logging.s3.amazonaws.com
          Action: s3:PutObject
          Resource: !Sub "${AccessLogsBucket.Arn}/*"
          Condition:
            StringEquals:
              aws:SourceAccount: !Ref "AWS::AccountId"
        - Sid: DenyInsecureConnections
          Effect: Deny
          Principal: "*"
          Action: s3:*
          Resource:
          - !GetAtt AccessLogsBucket.Arn
          - !Sub "${AccessLogsBucket.Arn}/*"
          Condition:
            Bool:
              aws:SecureTransport: 'false'

  # --- Pipeline Assets
  # KMS Key for CodePipeline
  CodePipelineKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS Key for Backup & Recovery with AWS Backup - Encrypts and decrypts pipeline artifacts and other data"
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: "key-default-1"
        Statement:
        - Sid: "Enable IAM User Permissions"
          Effect: "Allow"
          Principal:
            AWS:
            - !Sub "arn:aws:iam::${AWS::AccountId}:root"
          Action: 'kms:*'
          Resource: '*'
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  CreateAMIKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/aws-backup-codepipeline-kms"
      TargetKeyId: !Ref CodePipelineKMSKey

  # Pipeline definition
  ProductPipeline:
    DependsOn:
    - AWSBackupBucket
    - AWSBackupSolutionOrgUnit
    - AWSBackupCentralAccountOUSSM
    - AWSBackupCentralAccountIdSSM
    - AWSBackupCentralAccountRegionSSM
    - AWSBackupTargetGlobalRegion
    - AWSBackupTargetRegions
    - AWSBackupTargetOUs
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: backup-recovery-aws-backup
      DisableInboundStageTransitions:
      - StageName: DeployBackupOrgPolicy
        Reason: "Update the aws-backup-org-policy.yaml file with the central vault ARN before org policy deployment"
      ArtifactStore:
        Type: S3
        Location: !Ref DeploymentBucket
        EncryptionKey:
          Id: !Ref CodePipelineKMSKey
          Type: 'KMS'
      RoleArn:
        Fn::GetAtt:
        - CodePipelineManageStepsRole
        - Arn
      Stages:
      - Name: SourceStageGitHub
        Actions:
        - InputArtifacts: []
          Name: Source
          ActionTypeId:
            Category: Source
            Owner: AWS
            Version: '1'
            Provider: CodeStarSourceConnection
          Configuration:
            ConnectionArn: !Ref CodeConnectionArn # CodeConnections handshake reemplaza el GitHub PAT
            FullRepositoryId: !Sub "${GitHubUsername}/${GitHubRepo}" # owner/repo del fork
            BranchName: !Ref GitHubBranch # The branch you want to track in the forked repo
            OutputArtifactFormat: CODE_ZIP
          OutputArtifacts:
          - Name: SourceArtifacts
          Namespace: SourceVariables
      - Name: TestBackupRecoveryWithAWSBackup
        Actions:
        - InputArtifacts:
          - Name: SourceArtifacts
          Name: Static_Analysis
          ActionTypeId:
            Category: Build
            Owner: AWS
            Version: '1'
            Provider: CodeBuild
          Configuration:
            ProjectName: AWSBackup-ValidateTemplates
          RunOrder: 1
      - Name: DeployBackupRecoveryWithAWSBackupAssets
        Actions:
        - InputArtifacts:
          - Name: SourceArtifacts
          Name: Deploy_Templates
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Version: '1'
            Provider: S3
          Configuration:
            BucketName: !Ref DeploymentBucket
            Extract: true
            ObjectKey: deployment
            CannedACL: bucket-owner-full-control
          RunOrder: 1
      - Name: DeployCentralAcctResources
        Actions:
        - InputArtifacts:
          - Name: SourceArtifacts
          Name: Deploy_CentralAccountResources
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Version: '1'
            Provider: CloudFormation
          Configuration:
            ActionMode: CREATE_UPDATE
            StackName: stackset-aws-backup-central-backup-account
            RoleArn: !GetAtt CloudFormationRole.Arn
            Capabilities: CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
            TemplatePath: SourceArtifacts::cloudformation/stacksets/stackset-aws-backup-central-backup-account.yaml
            ParameterOverrides: |
              {
                "CommitId": "#{SourceVariables.CommitId}"
              }
          RunOrder: 1
      - Name: DeployBackupRecoveryMemberAccounts
        Actions:
        - InputArtifacts:
          - Name: SourceArtifacts
          Name: Deploy_MemberAccountsRole
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Version: '1'
            Provider: CloudFormation
          Configuration:
            ActionMode: CREATE_UPDATE
            StackName: stackset-aws-backup-member-accounts-role
            RoleArn: !GetAtt CloudFormationRole.Arn
            Capabilities: CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
            TemplatePath: SourceArtifacts::cloudformation/stacksets/stackset-aws-backup-member-accounts-role.yaml
            ParameterOverrides: |
              {
                "CommitId": "#{SourceVariables.CommitId}"
              }

          RunOrder: 1
        - InputArtifacts:
          - Name: SourceArtifacts
          Name: Deploy_MemberAccounts
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Version: '1'
            Provider: CloudFormation
          Configuration:
            ActionMode: CREATE_UPDATE
            StackName: stackset-aws-backup-member-accounts
            RoleArn: !GetAtt CloudFormationRole.Arn
            Capabilities: CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
            TemplatePath: SourceArtifacts::cloudformation/stacksets/stackset-aws-backup-member-accounts.yaml
            ParameterOverrides: |
              {
                "CommitId": "#{SourceVariables.CommitId}"
              }

          RunOrder: 2
        - InputArtifacts:
          - Name: SourceArtifacts
          Name: Deploy_MemberAccounts_Config_Framework
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Version: '1'
            Provider: CloudFormation
          Configuration:
            ActionMode: CREATE_UPDATE
            StackName: stackset-aws-backup-member-accounts-config-framework
            RoleArn: !GetAtt CloudFormationRole.Arn
            Capabilities: CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
            TemplatePath: SourceArtifacts::cloudformation/stacksets/stackset-aws-backup-member-accounts-config-framework.yaml
            ParameterOverrides: |
              {
                "CommitId": "#{SourceVariables.CommitId}"
              }

          RunOrder: 3
      - Name: DeployBackupOrgPolicy
        Actions:
        - InputArtifacts:
          - Name: SourceArtifacts
          Name: Deploy_BackupOrgPolicy
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Version: '1'
            Provider: CloudFormation
          Configuration:
            ActionMode: REPLACE_ON_FAILURE
            StackName: aws-backup-org-policy
            RoleArn: !GetAtt CloudFormationRole.Arn
            Capabilities: CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
            TemplatePath: SourceArtifacts::cloudformation/stacks/aws-backup-org-policy.yaml
            ParameterOverrides: |
              {
                "CommitId": "#{SourceVariables.CommitId}"
              }
          RunOrder: 1
      - !If
        - DeployReportFeatureCondition
        - Name: DeployReportPlan
          Actions:
          - InputArtifacts:
            - Name: SourceArtifacts
            Name: Deploy_ReportPlan
            ActionTypeId:
              Category: Deploy
              Owner: AWS
              Version: '1'
              Provider: CloudFormation
            Configuration:
              ActionMode: REPLACE_ON_FAILURE
              StackName: aws-backup-report-plan
              RoleArn: !GetAtt CloudFormationRole.Arn
              Capabilities: CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
              TemplatePath: SourceArtifacts::cloudformation/stacks/aws-backup-report-plan.yaml
              ParameterOverrides: |
                {
                  "CommitId": "#{SourceVariables.CommitId}"
                }

            RunOrder: 1
        - !Ref "AWS::NoValue"

  CodePipelineManageStepsRole:
    Type: AWS::IAM::Role
    # [Suppressions de checkov con justificación.
    #  Rol de ORQUESTACIÓN del pipeline (mueve artefactos entre stages). El CloudFormationRole (deploy
    #  role, el de mayor privilegio) ya fue acotado a least-privilege. Acotar los Resource:"*"
    #  residuales de este rol a ARNs de stacks + parameter/backup/* es remediación de entrega productiva.]
    #checkov:skip=CKV_AWS_108:Rol de orquestación del pipeline; scoping a ARNs de stacks = remediación de entrega productiva
    #checkov:skip=CKV_AWS_109:Rol de orquestación del pipeline; scoping a ARNs de stacks = remediación de entrega productiva
    #checkov:skip=CKV_AWS_111:Rol de orquestación del pipeline; scoping a ARNs de stacks = remediación de entrega productiva
    Properties:
      Description: CodePipeline role for moving objects through the build and deploy stages.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          Effect: Allow
          Principal:
            Service: codepipeline.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: CodePipelineManageS3Artifacts
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:PutObjectAcl
            - s3:GetObjectVersion
            - s3:GetBucketAcl
            - s3:GetBucketLocation
            Resource:
            - !GetAtt DeploymentBucket.Arn
            - Fn::Sub:
              - "${bucketarn}/*"
              - bucketarn: !GetAtt DeploymentBucket.Arn
      - PolicyName: codepipeline
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - codebuild:StartBuild
            - codebuild:StartBuild
            - codebuild:StopBuild
            - codebuild:BatchGetProjects
            - codebuild:BatchGetBuilds
            - codebuild:ListBuildsForProject
            Resource:
            - !GetAtt CodeBuildValidateTemplates.Arn
          - Effect: Allow
            Action:
            - iam:PassRole
            Resource: !GetAtt CloudFormationRole.Arn
          - Effect: Allow
            Action:
            - cloudformation:CreateStack
            - cloudformation:DeleteStack
            - cloudformation:DescribeStacks
            - cloudformation:DescribeStackEvents
            - cloudformation:UpdateStack
            - cloudformation:CreateChangeSet
            - cloudformation:DeleteChangeSet
            - cloudformation:DescribeChangeSet
            - cloudformation:ExecuteChangeSet
            - cloudformation:SetStackPolicy
            - cloudformation:ValidateTemplate
            Resource: "*"
          - Effect: Allow
            Action:
            - ssm:GetParameter
            - ssm:GetParameters
            Resource: "*"
          - Effect: Allow
            Action:
            - codebuild:ListBuilds
            - codebuild:ListProjects
            - codebuild:ListCuratedEnvironmentImages
            - codebuild:ListSourceCredentials
            Resource: "*"
          - Action:
            - 'kms:Encrypt'
            - 'kms:Decrypt'
            - 'kms:ReEncrypt*'
            - 'kms:GenerateDataKey*'
            - 'kms:DescribeKey'
            Resource: !GetAtt CodePipelineKMSKey.Arn
            Effect: Allow
          - Effect: Allow
            Action:
            - codestar-connections:UseConnection
            - codeconnections:UseConnection
            Resource: !Ref CodeConnectionArn

      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  CodeBuildValidateTemplates:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: AWSBackup-ValidateTemplates
      Description: Validate Cloudformation Templates with cfnnag
      ServiceRole:
        Fn::GetAtt:
        - CodeBuildRole
        - Arn
      Artifacts:
        Type: CODEPIPELINE
      EncryptionKey: !GetAtt CodePipelineKMSKey.Arn
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:3.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: codebuild/ValidateTemplates/buildspec-cfnnag.yml
      TimeoutInMinutes: 10
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      Description: CodeBuild role for static analysis of templates for backup-recovery-with-aws-backup solution.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          Effect: Allow
          Principal:
            Service: codebuild.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: CodeBuildManageS3Artifacts
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:PutObjectAcl
            - s3:GetObjectVersion
            - s3:GetBucketAcl
            - s3:GetBucketLocation
            Resource:
            - !GetAtt DeploymentBucket.Arn
            - Fn::Sub:
              - "${bucketarn}/*"
              - bucketarn: !GetAtt DeploymentBucket.Arn
          - Effect: Allow
            Action:
            - logs:CreateLogStream
            - logs:PutLogEvents
            - logs:DescribeLogStreams
            - logs:CreateLogGroup
            Resource:
            - Fn::Sub: arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*
          - Action:
            - 'kms:Encrypt'
            - 'kms:Decrypt'
            - 'kms:ReEncrypt*'
            - 'kms:GenerateDataKey*'
            - 'kms:DescribeKey'
            Resource: !GetAtt CodePipelineKMSKey.Arn
            Effect: Allow
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationRole
      Description: Role assumed by CloudFormation for deploying resources
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          Effect: Allow
          Principal:
            Service: cloudformation.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
      Policies:
      - PolicyName: CloudFormationPermissions
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          # [Remediado — least-privilege del deploy role (acotado a lo que el pipeline despliega)]
          # Original over-privileged (conservado para rollback):
          #   - Effect: Allow
          #     Action: [iam:*, codepipeline:*, ssm:*, s3:*, backup:*, secretsmanager:GetSecretValue, lambda:*]  # pragma: allowlist secret — texto dentro de comentario (policy original en rollback), no un secreto
          #     Resource: "*"
          # Acotado a lo que el pipeline realmente despliega: StackSets service-managed (cubierto por el
          # managed policy AWSCloudFormationFullAccess), Organizations policies (statements de abajo),
          # report plans + su S3 bucket, y lectura de SSM. Sin codepipeline/lambda/secretsmanager/iam:*.
          - Sid: SsmReadSolutionParams
            Effect: Allow
            Action:
            - ssm:GetParameter
            - ssm:GetParameters
            Resource: !Sub "arn:${AWS::Partition}:ssm:*:${AWS::AccountId}:parameter/backup/*"
          - Sid: ManageSolutionS3Buckets
            Effect: Allow
            Action:
            - s3:CreateBucket
            - s3:DeleteBucket
            - s3:ListBucket
            - s3:GetBucketLocation
            - s3:GetBucketAcl
            - s3:PutBucketTagging
            - s3:GetBucketTagging
            - s3:PutEncryptionConfiguration
            - s3:GetEncryptionConfiguration
            - s3:PutBucketPolicy
            - s3:GetBucketPolicy
            - s3:DeleteBucketPolicy
            - s3:PutBucketPublicAccessBlock
            - s3:GetBucketPublicAccessBlock
            - s3:PutBucketVersioning
            - s3:GetBucketVersioning
            Resource: !Sub "arn:${AWS::Partition}:s3:::*"
          - Sid: ManageBackupReportPlans
            Effect: Allow
            Action:
            - backup:CreateReportPlan
            - backup:DescribeReportPlan
            - backup:UpdateReportPlan
            - backup:DeleteReportPlan
            - backup:TagResource
            - backup:UntagResource
            Resource: !Sub "arn:${AWS::Partition}:backup:*:${AWS::AccountId}:report-plan:*"
          - Sid: ServiceLinkedRolesForSolution
            Effect: Allow
            Action:
            - iam:CreateServiceLinkedRole
            Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/*"
            Condition:
              StringEquals:
                iam:AWSServiceName:
                - stacksets.cloudformation.amazonaws.com
                - reports.backup.amazonaws.com
                - backup.amazonaws.com
          - Sid: AllowOrganizationsRead
            Effect: Allow
            Action:
            - organizations:Describe*
            - organizations:List*
            Resource: "*"
          - Sid: AllowBackupPoliciesCreation
            Effect: Allow
            Action:
            - organizations:CreatePolicy
            Resource: "*"
            Condition:
              StringEquals:
                organizations:PolicyType: BACKUP_POLICY
          - Sid: AllowBackupPoliciesModification
            Effect: Allow
            Action:
            - organizations:DescribePolicy
            - organizations:UpdatePolicy
            - organizations:DeletePolicy
            - organizations:TagResource
            - organizations:UntagResource
            Resource:
            - !Sub "arn:aws:organizations::${OrgMgmtAcctId}:policy/*/backup_policy/*"
            Condition:
              StringEquals:
                organizations:PolicyType: BACKUP_POLICY
          - Sid: AllowBackupPoliciesAttachmentAndDetachmentToAllAccountsAndOUs
            Effect: Allow
            Action:
            - organizations:AttachPolicy
            - organizations:DetachPolicy
            Resource:
            - !Sub "arn:aws:organizations::${OrgMgmtAcctId}:root/*"
            - !Sub "arn:aws:organizations::${OrgMgmtAcctId}:ou/*"
            - !Sub "arn:aws:organizations::${OrgMgmtAcctId}:account/*"
            - !Sub "arn:aws:organizations::${OrgMgmtAcctId}:policy/*/backup_policy/*"
            Condition:
              StringEquals:
                organizations:PolicyType: BACKUP_POLICY
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:PutObjectAcl
            - s3:GetObjectVersion
            - s3:GetBucketAcl
            - s3:GetBucketLocation
            - s3:ListBucket
            - s3:DeleteObject
            Resource:
            - !GetAtt DeploymentBucket.Arn
            - Fn::Sub:
              - "${bucketarn}/*"
              - bucketarn: !GetAtt DeploymentBucket.Arn
          - Action:
            - 'kms:Encrypt'
            - 'kms:Decrypt'
            - 'kms:ReEncrypt*'
            - 'kms:GenerateDataKey*'
            - 'kms:DescribeKey'
            Resource: !GetAtt CodePipelineKMSKey.Arn
            Effect: Allow

Outputs:
  DeploymentBucketName:
    Value: !Ref DeploymentBucket
    Description: "S3 deployment bucket name for deployment support of packages and resources"
    Export:
      Name: "aws-backup-s3-bucket-name"

  DeploymentBucketArn:
    Value: !GetAtt DeploymentBucket.Arn
    Description: "S3 deployment bucket ARN for deployment support of of packages and resources"
    Export:
      Name: "aws-backup-s3-bucket-arn"
