AWSTemplateFormatVersion: "2010-09-09"
Description: "SSM Parameter for Backup and Recovery with AWS Backup target OUs, Regions, Accounts, and Automation"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
    - Label:
        default: "Source Configuration (GitHub via CodeConnections)"
      Parameters:
      - GitHubUsername
      - GitHubRepo
      - GitHubBranch
      - CodeConnectionArn
    - Label:
        default: "Solution Configuration"
      Parameters:
      - OrgId
      - OrgMgmtAcctId
      - SolutionHomeOrgUnit
      - TargetGlobalRegion
      - TargetRegions
      - TargetOUs
    - Label:
        default: "Central Backup Account Configuration"
      Parameters:
      - AWSBackupCentralAccountOU
      - AWSBackupCentralAccountId
      - AWSBackupCentralAccountRegion
    - Label:
        default: "Backup Plan Configuration"
      Parameters:
      - DailyBackupSchedule
      - WeeklyBackupSchedule
      - MonthlyBackupSchedule
      - AnnualBackupSchedule
      - DailyRetentionDays
      - WeeklyRetentionDays
      - MonthlyRetentionDays
      - AnnualRetentionDays
      - ColdStorageAfterDays
      - OperationalTagKey
      - OperationalTagValue
      - ComplianceTagKey
      - ComplianceTagValue
    - Label:
        default: "Customer Specific Tags"
      Parameters:
      - BusinessUnit
      - CostCenter
      - Environment
      - ApplicationOwner
      - Application
    - Label:
        default: "AWS Backup Framework Configuration"
      Parameters:
      - DeployControl1
      - DeployControl2
      - DeployControl3
      - DeployControl4
      - DeployControl5
      - DeployControl6
      - DeployControl7
      - DeployControl8
      - DeployControl9
      - DeployControl10
    - Label:
        default: "AWS Backup Report Configuration"
      Parameters:
      - DeployReportFeature
      - DeployResourceComplianceReportPlan
      - DeployControlComplianceReportPlan
      - DeployBackupJobReportPlan
      - DeployCopyJobReportPlan
      - DeployRestoreJobReportPlan
    - Label:
        default: "AWS Config Configuration Recorder"
      Parameters:
      - DeployConfigurationRecorder

    ParameterLabels:
      GitHubRepo:
        default: "GitHub Repository"
      GitHubBranch:
        default: "GitHub Branch"
      GitHubUsername:
        default: "GitHub Username / Org"
      CodeConnectionArn:
        default: "CodeConnections Connection ARN"
      OrgId:
        default: "AWS Organization ID"
      OrgMgmtAcctId:
        default: "AWS Organization Management Account ID"
      SolutionHomeOrgUnit:
        default: "Solution Home Organizational Unit (OU)"
      TargetGlobalRegion:
        default: "Target Global Region"
      TargetRegions:
        default: "Target Regions"
      TargetOUs:
        default: "Target Organizational Units (OUs)"
      AWSBackupCentralAccountOU:
        default: "AWS Backup Central Account OU"
      AWSBackupCentralAccountId:
        default: "AWS Backup Central Account ID"
      AWSBackupCentralAccountRegion:
        default: "AWS Backup Central Account Region"
      BusinessUnit:
        default: "Business Unit"
      CostCenter:
        default: "Cost Center"
      Environment:
        default: "Environment"
      ApplicationOwner:
        default: "Application Owner"
      Application:
        default: "Application Name"
      DailyBackupSchedule:
        default: "Daily Backup Schedule (CRON)"
      WeeklyBackupSchedule:
        default: "Weekly Backup Schedule (CRON)"
      MonthlyBackupSchedule:
        default: "Monthly Backup Schedule (CRON)"
      AnnualBackupSchedule:
        default: "Annual Backup Schedule (CRON)"
      DailyRetentionDays:
        default: "Daily Retention (Days)"
      WeeklyRetentionDays:
        default: "Weekly Retention (Days)"
      MonthlyRetentionDays:
        default: "Monthly Retention (Days)"
      AnnualRetentionDays:
        default: "Annual Retention (Days)"
      ColdStorageAfterDays:
        default: "Move to Cold Storage After (Days) - monthly/annual only"
      OperationalTagKey:
        default: "Operational Selection Tag Key"
      OperationalTagValue:
        default: "Operational Selection Tag Value"
      ComplianceTagKey:
        default: "Compliance Selection Tag Key"
      ComplianceTagValue:
        default: "Compliance Selection Tag Value"

      DeployControl1:
        default: "Control #1-Backup resources are included in at least one backup plan"
      DeployControl2:
        default: "Control #2-Backup plan has minimum frequency and minimum retention"
      DeployControl3:
        default: "Control #3-Vaults prevent manual deletion of recovery points"
      DeployControl4:
        default: "Control #4-Recovery points are encrypted"
      DeployControl5:
        default: "Control #5-Minimum retention established for recovery point"
      DeployControl6:
        default: "Control #6-Cross-Region backup copy is scheduled"
      DeployControl7:
        default: "Control #7-Cross-account backup copy is scheduled"
      DeployControl8:
        default: "Control #8-Backups are protected by AWS Backup Vault Lock"
      DeployControl9:
        default: "Control #9-Last recovery point was created"
      DeployControl10:
        default: "Control #10-Restore time for resources meet target"

      DeployReportFeature:
        default: "Backup Audit Manager Report Feature"
      DeployResourceComplianceReportPlan:
        default: "Report Plan #1-RESOURCE_COMPLIANCE_REPORT"
      DeployControlComplianceReportPlan:
        default: "Report Plan #2-CONTROL_COMPLIANCE_REPORT"
      DeployBackupJobReportPlan:
        default: "Report Plan #3-BACKUP_JOB_REPORT"
      DeployCopyJobReportPlan:
        default: "Report Plan #4-COPY_JOB_REPORT"
      DeployRestoreJobReportPlan:
        default: "Report Plan #5-RESTORE_JOB_REPORT"

      DeployConfigurationRecorder:
        default: "Auto-configuration of AWS Config Configuration Recorder"

Parameters:
  GitHubRepo:
    Description: The forked solution GitHub repository name
    Type: String
    Default: "backup-recovery-with-aws-backup"
  GitHubBranch:
    Description: Your repository branch to use
    Type: String
    Default: "main"

  GitHubUsername:
    Description: Your GitHub Username/Org that owns the forked solution repository.
    Type: String
  CodeConnectionArn:
    Description: ARN of the AWS CodeConnections connection to GitHub (provider CodeStarSourceConnection). Reemplaza el GitHub PAT.
    Type: String
    AllowedPattern: "^arn:aws[a-z-]*:(codeconnections|codestar-connections):[a-z0-9-]+:[0-9]{12}:connection/[a-f0-9-]+$"

  OrgId:
    Description: The AWS Organizations ID where backup policies will be administered
    Type: String

  OrgMgmtAcctId:
    Description: The AWS Organizations Management Account ID where backup policies will be administered
    Type: String

  SolutionHomeOrgUnit:
    Description: The AWS Organizational Unit (OU) in which this solution home account lives
    Type: String

  TargetGlobalRegion:
    Description: Target region for global resources
    Type: String
  TargetRegions:
    Description: Comma separated list of regions that you want to configure for backup
    Type: String
  TargetOUs:
    Description: A comma separated list of OUs whose accounts you want to configure for backup
    Type: String

  AWSBackupCentralAccountOU:
    Type: String
    Description: The AWS OU for the central account that will be the secondary store for all accounts / regions. Secondary copies will be in the selected account within this OU.
  AWSBackupCentralAccountId:
    Type: String
    Description: The AWS Account ID for the central account that will be the secondary store for all AWS Backups. Secondary copies will be in this account.
  AWSBackupCentralAccountRegion:
    Type: String
    Description: The region for the central account that will be the secondary store for all AWS Backups. Secondary copies will be in this region.

  # --- Backup Plan Configuration (alimenta los SSM Parameters que consume el org-policy) ---
  DailyBackupSchedule:
    Description: CRON del backup diario (operativo). Ej. cron(0 5 ? * * *).
    Type: String
    Default: cron(0 5 ? * * *)
  WeeklyBackupSchedule:
    Description: CRON del backup semanal (operativo). Ej. cron(0 5 ? * 1 *) (domingos 05:00 UTC).
    Type: String
    Default: cron(0 5 ? * 1 *)
  MonthlyBackupSchedule:
    Description: CRON del backup mensual (operativo). Ej. cron(0 5 1 * ? *) (1° de mes 05:00 UTC).
    Type: String
    Default: cron(0 5 1 * ? *)
  AnnualBackupSchedule:
    Description: CRON del backup anual (compliance). Ej. cron(0 5 1 1 ? *) (1° de enero 05:00 UTC).
    Type: String
    Default: cron(0 5 1 1 ? *)
  DailyRetentionDays:
    Description: Retencion del tier diario (dias).
    Type: String
    Default: '35'
  WeeklyRetentionDays:
    Description: Retencion del tier semanal (dias).
    Type: String
    Default: '90'
  MonthlyRetentionDays:
    Description: Retencion del tier mensual (dias).
    Type: String
    Default: '365'
  AnnualRetentionDays:
    Description: Retencion del tier anual/compliance (dias). CNV = 2555 (7 anios).
    Type: String
    Default: '2555'
  ColdStorageAfterDays:
    Description: Dias hasta transicionar a cold (Archive). Solo monthly/annual (AWS exige delete_after >= cold + 90).
    Type: String
    Default: '30'
  OperationalTagKey:
    Description: Tag key de seleccion de la cobertura operativa base.
    Type: String
    Default: backup
  OperationalTagValue:
    Description: Tag value de seleccion de la cobertura operativa base.
    Type: String
    Default: 'yes'
  ComplianceTagKey:
    Description: Tag key de seleccion del subconjunto regulado (tier anual/compliance).
    Type: String
    Default: data-class
  ComplianceTagValue:
    Description: Tag value de seleccion del subconjunto regulado (tier anual/compliance).
    Type: String
    Default: regulated

  BusinessUnit:
    Description: Business Unit Name
    Type: String
    MinLength: '1'
    MaxLength: '255'
    AllowedValues:
    - Marketing
    - Engineering
    - R&D
    ConstraintDescription: Must be a valid business unit
    Default: Engineering
  CostCenter:
    Description: Cost Center for AWS Services
    Type: String
    MinLength: '1'
    MaxLength: '255'
    Default: '00000'
  Environment:
    Description: Environment
    Type: String
    AllowedValues:
    - development
    - qa
    - production
    ConstraintDescription: Must be a valid environment
    Default: development
  ApplicationOwner:
    Description: Email address of the application owner
    Type: String
    Default: someone@example.com
  Application:
    Description: Application Name
    Type: String
    Default: Backup and Recovery with AWS Backup
  DeployControl1:
    Description: 'Do you want to evaluates if resources are included in at least one backup plan?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployControl2:
    Description: 'Do you want to evaluates if backup frequency is at least x day and retention period is at least y days?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployControl3:
    Description: 'Do you want to evaluates if backup vaults do not allow manual deletion of recovery points except by certain AWS Identity and Access Management (IAM) roles?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "no"
  DeployControl4:
    Description: 'Do you want to evaluates if the recovery points are encrypted?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployControl5:
    Description: 'Do you want to Evaluates if the recovery point retention period is at least x days?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployControl6:
    Description: 'Do you want to ealuates if a resource is configured to create copies of its backups to another AWS Region?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "no"
  DeployControl7:
    Description: 'Do you want to evaluates if a resource has a cross-account backup copy configured?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployControl8:
    Description: 'Do you want to evaluates if a resource is configured to have backups in locked backup vault?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "no"
  DeployControl9:
    Description: 'Do you want to evaluates if a recovery point was created within specified time frame?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployControl10:
    Description: 'Do you want to evaluates if restore testing job completed within target restore time?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "no"

  DeployReportFeature:
    Description: 'Do you want to deploy Report resources?'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployResourceComplianceReportPlan:
    Description: 'Do you want to create a Resource Compliance Report Plan? This parameter is only used if the value of "Backup Audit Manager Report Feature" is set to true.'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployControlComplianceReportPlan:
    Description: 'Do you want to create a Control Compliance Report Plan? This parameter is only used if the value of "Backup Audit Manager Report Feature" is set to true.'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployBackupJobReportPlan:
    Description: 'Do you want to create a Backup Job Report Plan? This parameter is only used if the value of "Backup Audit Manager Report Feature" is set to true.'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployCopyJobReportPlan:
    Description: 'Do you want to create a Copy Job Report Plan? This parameter is only used if the value of "Backup Audit Manager Report Feature" is set to true.'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployRestoreJobReportPlan:
    Description: 'Do you want to create a Restore Job Report Plan? This parameter is only used if the value of "Backup Audit Manager Report Feature" is set to true.'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "yes"
  DeployConfigurationRecorder:
    Description: 'Do you want to configure a Configuration Recorders for each region you use. If you select false, you must configure one Configuration Recorder for each region that you use manually.'
    Type: String
    AllowedValues:
    - "yes"
    - "no"
    Default: "no"

Conditions:
  # Fix: "true" -> "yes" (los AllowedValues del parametro son yes/no; con "true" el
  # condition nunca daba verdadero y los report plans no se desplegaban).
  DeployReportFeatureCondition: !Equals [ !Ref DeployReportFeature, "yes" ]

Resources:
  AWSBackupOrgId:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The AWS Organizations ID where backup policies will be administered.
      Name: "/backup/org-id"
      Type: String
      Value: !Ref OrgId
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupBucket:
    Type: AWS::SSM::Parameter
    Properties:
      Description: S3 bucket used to store source artifacts for Backup and Recovery with AWS Backup solution.
      Name: "/backup/bucket"
      Type: String
      Value: !Ref DeploymentBucket
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupSolutionOrgUnit:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "AWS Solution AWS Organizations Unit for Backup and Recovery with AWS Backup solution"
      Name: "/backup/solution-ou"
      Type: String
      Value: !Ref SolutionHomeOrgUnit
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupCentralAccountOUSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "The AWS OU for the central account that will be the secondary store for all AWS Backups.  Secondary copies will be in an account within this OU"
      Name: "/backup/central-account-ou"
      Type: String
      Value: !Ref AWSBackupCentralAccountOU
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupCentralAccountIdSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "The AWS Account ID for the central account that will be the secondary store for all AWS Backups.  Secondary copies will be in this account."
      Name: "/backup/central-account-id"
      Type: String
      Value: !Ref AWSBackupCentralAccountId
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupCentralAccountRegionSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "The region for the central account that will be the secondary store for all AWS Backups.  Secondary copies will be in this region."
      Name: "/backup/central-account-region"
      Type: String
      Value: !Ref AWSBackupCentralAccountRegion
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupCentralVaultSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "The ARN for the Central Backup Vault that will be the secondary store for all AWS Backups."
      Name: "/backup/central-vault-arn"
      Type: String
      Value: !Sub "arn:aws:backup:${AWSBackupCentralAccountRegion}:${AWSBackupCentralAccountId}:backup-vault:AWSBackupSolutionCentralVault"
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  # --- SSM Parameters del Backup Plan (consumidos por aws-backup-org-policy.yaml) ---
  DailyBackupScheduleParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: CRON del backup diario (operativo).
      Name: "/backup/schedule/daily"
      Type: String
      Value: !Ref DailyBackupSchedule
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  WeeklyBackupScheduleParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: CRON del backup semanal (operativo).
      Name: "/backup/schedule/weekly"
      Type: String
      Value: !Ref WeeklyBackupSchedule
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  MonthlyBackupScheduleParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: CRON del backup mensual (operativo).
      Name: "/backup/schedule/monthly"
      Type: String
      Value: !Ref MonthlyBackupSchedule
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AnnualBackupScheduleParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: CRON del backup anual (compliance).
      Name: "/backup/schedule/annual"
      Type: String
      Value: !Ref AnnualBackupSchedule
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  DailyRetentionDaysParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Retencion del tier diario (dias).
      Name: "/backup/retention/daily"
      Type: String
      Value: !Ref DailyRetentionDays
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  WeeklyRetentionDaysParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Retencion del tier semanal (dias).
      Name: "/backup/retention/weekly"
      Type: String
      Value: !Ref WeeklyRetentionDays
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  MonthlyRetentionDaysParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Retencion del tier mensual (dias).
      Name: "/backup/retention/monthly"
      Type: String
      Value: !Ref MonthlyRetentionDays
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AnnualRetentionDaysParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Retencion del tier anual/compliance (dias). CNV = 2555 (7 anios).
      Name: "/backup/retention/annual"
      Type: String
      Value: !Ref AnnualRetentionDays
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  ColdStorageAfterDaysParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Dias hasta transicionar a cold (Archive). Solo monthly/annual.
      Name: "/backup/lifecycle/cold-after-days"
      Type: String
      Value: !Ref ColdStorageAfterDays
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  OperationalTagKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Tag key de seleccion de la cobertura operativa base.
      Name: "/backup/selection/operational-tag-key"
      Type: String
      Value: !Ref OperationalTagKey
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  OperationalTagValueParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Tag value de seleccion de la cobertura operativa base.
      Name: "/backup/selection/operational-tag-value"
      Type: String
      Value: !Ref OperationalTagValue
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  ComplianceTagKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Tag key de seleccion del subconjunto regulado (tier anual/compliance).
      Name: "/backup/selection/compliance-tag-key"
      Type: String
      Value: !Ref ComplianceTagKey
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  ComplianceTagValueParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: Tag value de seleccion del subconjunto regulado (tier anual/compliance).
      Name: "/backup/selection/compliance-tag-value"
      Type: String
      Value: !Ref ComplianceTagValue
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupTargetGlobalRegion:
    Type: AWS::SSM::Parameter
    Properties:
      Description: !Sub "Target region for global resources for Backup and Recovery with AWS Backup solution"
      Name: "/backup/target/global-region"
      Type: String
      Value: !Ref AWS::Region
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupTargetRegions:
    Type: AWS::SSM::Parameter
    Properties:
      Description: !Sub "Target regions for Backup and Recovery with AWS Backup solution"
      Name: "/backup/target/regions"
      Type: StringList
      Value: !Ref TargetRegions
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupTargetOUs:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "Target OUs for Backup and Recovery with AWS Backup solution"
      Name: "/backup/target/organizational-units"
      Type: StringList
      Value: !Ref TargetOUs
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupFrameworkControl1:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "Do you want to evaluates if resources are included in at least one backup plan?"
      Name: "/backup/control1"
      Type: String
      Value: !Ref DeployControl1
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupFrameworkControl2:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "Do you want to evaluate if backup frequency is at least x day and retention period is at least y days?"
      Name: "/backup/control2"
      Type: String
      Value: !Ref DeployControl2
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupFrameworkControl3:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "Do you want to evaluates if backup vaults do not allow manual deletion of recovery points except by certain AWS Identity and Access Management (IAM) roles?"
      Name: "/backup/control3"
      Type: String
      Value: !Ref DeployControl3
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupFrameworkControl4:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "Do you want to evaluates if the recovery points are encrypted?"
      Name: "/backup/control4"
      Type: String
      Value: !Ref DeployControl4
      Tags:
        Application: !Ref Application
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Environment: !Ref Environment
        ApplicationOwner: !Ref ApplicationOwner

  AWSBackupFrameworkControl5:
    Type: AWS::SSM::Parameter
    Properties:
