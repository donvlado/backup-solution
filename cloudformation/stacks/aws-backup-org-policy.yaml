AWSTemplateFormatVersion: '2010-09-09'
Transform:
- 'AWS::LanguageExtensions'
Description: >-
  Despliega AWS Organizations Backup Policies para gestionar backups a nivel
  organizacional. Debe desplegarse en la management account o desde una cuenta
  con permisos de delegated administrator.

# Modelo POR CADENCIA — 4 policies
# (best practice AWS = 1 plan por policy):
#   - org-daily-backup-policy      (tag backup=daily,   35d warm).
#   - org-weekly-backup-policy     (tag backup=weekly,  90d warm).
#   - org-monthly-backup-policy    (tag backup=monthly, 365d, cold @ ColdStorageAfterDays).
#   - org-compliance-backup-policy (tag data-class=regulated, annual 2555d / 7 anios CNV, cold @ N) — overlay.
# El tag backup=none no coincide con ninguna policy (recurso excluido del backup centralizado).
# Toda la configuracion (schedules, retenciones, cold, tags de seleccion) se
# externaliza a SSM Parameters creados por el root template.

Parameters:
  pOrgBackupTargetOUs:
    Description: A comma separated list of the AWS Organizations OUs to attach
      backup policies.
    Type: AWS::SSM::Parameter::Value<CommaDelimitedList>
    Default: "/backup/target/organizational-units"
  pRegions:
    Description: Target regions for backup plans as a comma delimited list
    Type: AWS::SSM::Parameter::Value<CommaDelimitedList>
    Default: "/backup/target/regions"
  pCentralBackupVaultArn:
    Description: The ARN of a centralized AWS Backup Vault that will be the
      secondary store for all AWS Backups.  The defined organization backup
      policy plans will "copy_to" this vault.
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/central-vault-arn"
  pCrossAccountBackupRole:
    Description: This is the IAM role name for the cross-account backup role that
      carries out the backup activities.
    Type: String
    Default: AWSBackupSolutionRole
  pMemberAccountBackupVault:
    AllowedPattern: ^[a-zA-Z0-9\-\_\.]{1,50}$
    ConstraintDescription: The name of the member account Backup vaults. (Name is case sensitive).
    Type: String
    Default: AWSBackupSolutionVault

  # --- Schedules (SSM-driven) ---
  DailyBackupSchedule:
    Description: CRON del backup diario (operativo). Ej. cron(0 5 ? * * *).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/schedule/daily"
  WeeklyBackupSchedule:
    Description: CRON del backup semanal (operativo). Ej. cron(0 5 ? * 1 *) (domingos 05:00 UTC).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/schedule/weekly"
  MonthlyBackupSchedule:
    Description: CRON del backup mensual (operativo). Ej. cron(0 5 1 * ? *) (1° de mes 05:00 UTC).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/schedule/monthly"
  AnnualBackupSchedule:
    Description: CRON del backup anual (compliance). Ej. cron(0 5 1 1 ? *) (1° de enero 05:00 UTC).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/schedule/annual"

  # --- Retenciones en dias (SSM-driven) ---
  DailyRetentionDays:
    Description: Retencion del tier diario (dias).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/retention/daily"
  WeeklyRetentionDays:
    Description: Retencion del tier semanal (dias).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/retention/weekly"
  MonthlyRetentionDays:
    Description: Retencion del tier mensual (dias).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/retention/monthly"
  AnnualRetentionDays:
    Description: Retencion del tier anual/compliance (dias). CNV = 2555 (7 anios).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/retention/annual"

  # --- Transicion a cold (SSM-driven) ---
  # AWS exige delete_after_days >= move_to_cold_storage_after_days + 90.
  # Por eso el cold solo aplica a monthly (365) y annual (2555); daily/weekly quedan warm.
  ColdStorageAfterDays:
    Description: Dias hasta transicionar a cold (Archive). Solo monthly/annual.
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/lifecycle/cold-after-days"

  # --- Seleccion hibrida (SSM-driven) ---
  # NOTA (constraint): las AWS Organizations backup policies solo seleccionan POR TAG
  # (selections.tags). No admiten seleccion por tipo de recurso ni "todos los recursos".
  # La cobertura "todo lo que vive en la OU" se logra taggeando los recursos con el tag
  # operativo (los recursos se taggean; a escala, auto-tagging via tag policy).
  pOperationalTagKey:
    Description: Tag key de la seleccion operativa POR CADENCIA. Los valores son literales por plan (daily/weekly/monthly); backup=none no matchea (excluido). El SSM /backup/selection/operational-tag-value que crea el root template queda sin uso.
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/selection/operational-tag-key"
  pComplianceTagKey:
    Description: Tag key de seleccion del subconjunto regulado (tier anual/compliance).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/selection/compliance-tag-key"
  pComplianceTagValue:
    Description: Tag value de seleccion del subconjunto regulado (tier anual/compliance).
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/backup/selection/compliance-tag-value"

  pTagKey:
    Type: String
    Description: This is the tag key to assign to recovery points.
    Default: 'project'
  pTagValue:
    Type: String
    Description: This is the tag value to assign to recovery points.
    Default: 'aws-backup'

  # Parameters for tagging
  CommitId:
    Description: The commit id for the change
    Type: String
  BusinessUnit:
    Description: Business Unit Name
    Type: String
    MinLength: '1'
    MaxLength: '255'
    AllowedValues:
    - Marketing
    - Engineering
    - R&D
    ConstraintDescription: Must be a valid business unit
    Default: Engineering
  CostCenter:
    Description: Cost Center for AWS Services
    Type: String
    MinLength: '1'
    MaxLength: '255'
    Default: '00000'
  Environment:
    Description: Environment
    Type: String
    AllowedValues:
    - Development
    - QA
    - Production
    ConstraintDescription: Must be a valid environment.
    Default: Development
  ApplicationOwner:
    Description: Email address of application owner
    Type: String
    Default: selfserviceservicecatalog@example.com
  Application:
    Description: Application Name
    Type: String
    Default: Example Application

Resources:
  # ==========================================================================
  # Policies OPERATIVAS — modelo POR CADENCIA (tag backup = daily|weekly|monthly|none).
  # UNA policy por cadencia (best practice AWS: 1 plan por policy -> troubleshooting aislado):
  #   backup=daily   -> rOrgDailyBackupPolicy   (35d warm)
  #   backup=weekly  -> rOrgWeeklyBackupPolicy  (90d warm)
  #   backup=monthly -> rOrgMonthlyBackupPolicy (365d, cold a ColdStorageAfterDays)
  #   backup=none    -> no matchea ninguna seleccion (excluido de facto)
  # data-class=regulated agrega el tier annual (policy Compliance, abajo).
  # Cada rule copia al central vault (copy_actions).
  # ==========================================================================

  # ---- DAILY (warm, 35d) -> backup=daily ----
  rOrgDailyBackupPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: org-daily-backup-policy
      Description: >-
        Operational daily backup policy (warm) selected by the backup=daily tag.
      Type: BACKUP_POLICY
      TargetIds: !Ref pOrgBackupTargetOUs
      Content:
        Fn::ToJsonString:
          plans:
            OrgBackupPlanDaily:
              rules:
                OrgDailyBackupRule:
                  schedule_expression:
                    "@@assign": !Ref DailyBackupSchedule
                  start_backup_window_minutes:
                    "@@assign": '60'
                  complete_backup_window_minutes:
                    "@@assign": '1200'
                  lifecycle:
                    delete_after_days:
                      "@@assign": !Ref DailyRetentionDays
                  target_backup_vault_name:
                    "@@assign": !Ref pMemberAccountBackupVault
                  recovery_point_tags:
                    project:
                      tag_key:
                        "@@assign": !Ref pTagKey
                      tag_value:
                        "@@assign": !Ref pTagValue
                  copy_actions:
                    # La key debe ser identica al ARN destino (requisito de sintaxis de Backup Policy).
                    "arn:aws:backup:us-east-1:789712594936:backup-vault:AWSBackupSolutionCentralVault":
                      target_backup_vault_arn:
                        "@@assign": !Ref pCentralBackupVaultArn
                      lifecycle:
                        delete_after_days:
                          "@@assign": !Ref DailyRetentionDays
              backup_plan_tags:
                project:
                  tag_key:
                    "@@assign": !Ref pTagKey
                  tag_value:
                    "@@assign": !Ref pTagValue
              regions:
                "@@append": !Ref pRegions
              selections:
                tags:
                  OrgDailyBackupSelection:
                    iam_role_arn:
                      "@@assign": !Sub 'arn:aws:iam::$account:role/${pCrossAccountBackupRole}'
                    tag_key:
                      "@@assign": !Ref pOperationalTagKey
                    tag_value:
                      "@@assign":
                      - "daily"
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: CommitId
        Value: !Ref CommitId
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  # ---- WEEKLY (warm, 90d) -> backup=weekly ----
  rOrgWeeklyBackupPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: org-weekly-backup-policy
      Description: >-
        Operational weekly backup policy (warm) selected by the backup=weekly tag.
      Type: BACKUP_POLICY
      TargetIds: !Ref pOrgBackupTargetOUs
      Content:
        Fn::ToJsonString:
          plans:
            OrgBackupPlanWeekly:
              rules:
                OrgWeeklyBackupRule:
                  schedule_expression:
                    "@@assign": !Ref WeeklyBackupSchedule
                  start_backup_window_minutes:
                    "@@assign": '60'
                  complete_backup_window_minutes:
                    "@@assign": '1200'
                  lifecycle:
                    delete_after_days:
                      "@@assign": !Ref WeeklyRetentionDays
                  target_backup_vault_name:
                    "@@assign": !Ref pMemberAccountBackupVault
                  recovery_point_tags:
                    project:
                      tag_key:
                        "@@assign": !Ref pTagKey
                      tag_value:
                        "@@assign": !Ref pTagValue
                  copy_actions:
                    "arn:aws:backup:us-east-1:789712594936:backup-vault:AWSBackupSolutionCentralVault":
                      target_backup_vault_arn:
                        "@@assign": !Ref pCentralBackupVaultArn
                      lifecycle:
                        delete_after_days:
                          "@@assign": !Ref WeeklyRetentionDays
              backup_plan_tags:
                project:
                  tag_key:
                    "@@assign": !Ref pTagKey
                  tag_value:
                    "@@assign": !Ref pTagValue
              regions:
                "@@append": !Ref pRegions
              selections:
                tags:
                  OrgWeeklyBackupSelection:
                    iam_role_arn:
                      "@@assign": !Sub 'arn:aws:iam::$account:role/${pCrossAccountBackupRole}'
                    tag_key:
                      "@@assign": !Ref pOperationalTagKey
                    tag_value:
                      "@@assign":
                      - "weekly"
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: CommitId
        Value: !Ref CommitId
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  # ---- MONTHLY (cold a ColdStorageAfterDays, 365d) -> backup=monthly ----
  rOrgMonthlyBackupPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: org-monthly-backup-policy
      Description: >-
        Operational monthly backup policy (cold after ColdStorageAfterDays)
        selected by the backup=monthly tag.
      Type: BACKUP_POLICY
      TargetIds: !Ref pOrgBackupTargetOUs
      Content:
        Fn::ToJsonString:
          plans:
            OrgBackupPlanMonthly:
              rules:
                OrgMonthlyBackupRule:
                  schedule_expression:
                    "@@assign": !Ref MonthlyBackupSchedule
                  start_backup_window_minutes:
                    "@@assign": '60'
                  complete_backup_window_minutes:
                    "@@assign": '1200'
                  lifecycle:
                    move_to_cold_storage_after_days:
                      "@@assign": !Ref ColdStorageAfterDays
                    delete_after_days:
                      "@@assign": !Ref MonthlyRetentionDays
                  target_backup_vault_name:
                    "@@assign": !Ref pMemberAccountBackupVault
                  recovery_point_tags:
                    project:
                      tag_key:
                        "@@assign": !Ref pTagKey
                      tag_value:
                        "@@assign": !Ref pTagValue
                  copy_actions:
                    "arn:aws:backup:us-east-1:789712594936:backup-vault:AWSBackupSolutionCentralVault":
                      target_backup_vault_arn:
                        "@@assign": !Ref pCentralBackupVaultArn
                      lifecycle:
                        move_to_cold_storage_after_days:
                          "@@assign": !Ref ColdStorageAfterDays
                        delete_after_days:
                          "@@assign": !Ref MonthlyRetentionDays
              backup_plan_tags:
                project:
                  tag_key:
                    "@@assign": !Ref pTagKey
                  tag_value:
                    "@@assign": !Ref pTagValue
              regions:
                "@@append": !Ref pRegions
              selections:
                tags:
                  OrgMonthlyBackupSelection:
                    iam_role_arn:
                      "@@assign": !Sub 'arn:aws:iam::$account:role/${pCrossAccountBackupRole}'
                    tag_key:
                      "@@assign": !Ref pOperationalTagKey
                    tag_value:
                      "@@assign":
                      - "monthly"
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: CommitId
        Value: !Ref CommitId
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner

  # ==========================================================================
  # Policy COMPLIANCE — 1 rule annual (retencion CNV 7 anios), cold a los N dias.
  # Seleccion por tag data-class=regulated (subconjunto regulado).
  # ==========================================================================
  rOrgComplianceBackupPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: org-compliance-backup-policy
      Description: >-
        Compliance annual backup policy (CNV 7-year retention) for the regulated
        subset as per the resource selection criteria
      Type: BACKUP_POLICY
      TargetIds: !Ref pOrgBackupTargetOUs
      Content:
        Fn::ToJsonString:
          plans:
            OrgBackupPlanCompliance:
              rules:
                OrgAnnualBackupRule:
                  schedule_expression:
                    "@@assign": !Ref AnnualBackupSchedule
                  start_backup_window_minutes:
                    "@@assign": '60'
                  complete_backup_window_minutes:
                    "@@assign": '1200'
                  lifecycle:
                    move_to_cold_storage_after_days:
                      "@@assign": !Ref ColdStorageAfterDays
                    delete_after_days:
                      "@@assign": !Ref AnnualRetentionDays
                  target_backup_vault_name:
                    "@@assign": !Ref pMemberAccountBackupVault
                  recovery_point_tags:
                    project:
                      tag_key:
                        "@@assign": !Ref pTagKey
                      tag_value:
                        "@@assign": !Ref pTagValue
                  copy_actions:
                    "arn:aws:backup:us-east-1:789712594936:backup-vault:AWSBackupSolutionCentralVault":
                      target_backup_vault_arn:
                        "@@assign": !Ref pCentralBackupVaultArn
                      lifecycle:
                        move_to_cold_storage_after_days:
                          "@@assign": !Ref ColdStorageAfterDays
                        delete_after_days:
                          "@@assign": !Ref AnnualRetentionDays
              backup_plan_tags:
                project:
                  tag_key:
                    "@@assign": !Ref pTagKey
                  tag_value:
                    "@@assign": !Ref pTagValue
              regions:
                "@@append": !Ref pRegions
              selections:
                tags:
                  OrgComplianceBackupSelection:
                    iam_role_arn:
                      "@@assign": !Sub "arn:aws:iam::$account:role/${pCrossAccountBackupRole}"
                    tag_key:
                      "@@assign": !Ref pComplianceTagKey
                    tag_value:
                      "@@assign":
                      - !Ref pComplianceTagValue
      Tags:
      - Key: Application
        Value: !Ref Application
      - Key: CommitId
        Value: !Ref CommitId
      - Key: BusinessUnit
        Value: !Ref BusinessUnit
      - Key: CostCenter
        Value: !Ref CostCenter
      - Key: Environment
        Value: !Ref Environment
      - Key: ApplicationOwner
        Value: !Ref ApplicationOwner
